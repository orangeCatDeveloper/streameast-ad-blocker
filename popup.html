<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header .shield {
      font-size: 28px;
      line-height: 1;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .status {
      background: #16213e;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }
    .status-label {
      font-size: 13px;
      color: #aaa;
    }
    .status-value {
      font-size: 13px;
      font-weight: 600;
      color: #4ade80;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #16213e;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .toggle-label {
      font-size: 13px;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 24px;
      transition: 0.3s;
    }
    .slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle input:checked + .slider {
      background: #4ade80;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(20px);
    }
    .footer {
      text-align: center;
      font-size: 11px;
      color: #666;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="shield">🛡️</span>
    <h1>Stream Ad Blocker</h1>
  </div>

  <div class="status">
    <div class="status-row">
      <span class="status-label">Status</span>
      <span class="status-value" id="status-text">Protected</span>
    </div>
    <div class="status-row">
      <span class="status-label">Popups Blocked</span>
      <span class="status-value" id="popup-count">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">Overlays Removed</span>
      <span class="status-value" id="overlay-count">-</span>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Block Popups</span>
    <label class="toggle">
      <input type="checkbox" id="block-popups" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Remove Overlay Ads</span>
    <label class="toggle">
      <input type="checkbox" id="block-overlays" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="toggle-row">
    <span class="toggle-label">Block Malicious Downloads</span>
    <label class="toggle">
      <input type="checkbox" id="block-downloads" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="footer">One click to play your video</div>

  <script src="popup.js"></script>
</body>
</html>
